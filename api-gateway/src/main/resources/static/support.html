<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객 지원 - 스토맵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #fff;
      color: #333;
      line-height: 1.7;
      padding: 24px 20px 60px;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 12px; }
    h2 { font-size: 15px; font-weight: 700; color: #111; margin: 28px 0 8px; }
    p  { font-size: 14px; color: #555; margin-bottom: 8px; }
    ul { padding-left: 18px; margin-bottom: 8px; }
    li { font-size: 14px; color: #555; margin-bottom: 6px; }
    .contact-box {
      background: #f7f9ff;
      border: 1px solid #dce8ff;
      border-radius: 10px;
      padding: 16px 20px;
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .contact-box a {
      font-size: 15px;
      font-weight: 600;
      color: #4D91FF;
      text-decoration: none;
    }
    hr { border: none; border-top: 1px solid #eee; margin: 28px 0 16px; }
    .footer { font-size: 13px; color: #999; }
    .app-name { color: #4D91FF; font-weight: 700; }
  </style>
</head>
<body>

  <h1>고객 지원</h1>
  <p>
    <span class="app-name">스토맵</span> 서비스 이용 중 불편한 점이나 문의 사항이 있으시면 아래 이메일로 연락해 주세요.<br />
    빠르게 확인하고 답변드리겠습니다.
  </p>

  <h2>문의 이메일</h2>
  <div class="contact-box">
    <a href="mailto:support@unimal.co.kr">support@unimal.co.kr</a>
  </div>

  <h2>문의 가능 항목</h2>
  <ul>
    <li>서비스 이용 관련 문의</li>
    <li>계정 및 로그인 문제</li>
    <li>계정 삭제 및 재가입 문의</li>
    <li>게시글·댓글 신고</li>
    <li>버그 및 오류 제보</li>
    <li>기타 서비스 관련 의견</li>
  </ul>

  <h2>운영 시간</h2>
  <p>평일 10:00 – 18:00 (주말 및 공휴일 제외)</p>
  <p>문의량에 따라 답변이 다소 지연될 수 있습니다.</p>

  <hr />
  <p class="footer">스토맵 · 유니멀 아틀라스</p>

</body>
</html>
